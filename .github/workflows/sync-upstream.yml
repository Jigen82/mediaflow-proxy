name: Sync upstream (auto mirror)

on:
  schedule:
    - cron: '0 * * * *' # ogni ora
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/mhdzumair/mediaflow-proxy.git || true

      - name: Fetch upstream
        run: |
          git fetch upstream

      - name: Sync fork with upstream (mirror)
        run: |
          if git diff --quiet HEAD upstream/main; then
            echo "Repo già allineata all'upstream"
            exit 0
          fi

          echo "Cambiamenti trovati, sincronizzo il fork"

          # preserva il workflow
          cp .github/workflows/sync-upstream.yml /tmp/sync-upstream.yml

          # mirror totale
          git reset --hard upstream/main

          # ripristina il workflow
          mkdir -p .github/workflows
          mv /tmp/sync-upstream.yml .github/workflows/sync-upstream.yml

          git add .
          git commit -m "Sync fork with upstream" || echo "Niente da committare"
          git push origin main --force
